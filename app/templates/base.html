<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}JobAssistant{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your custom CSS -->
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<!-- Skip to main content for keyboard navigation -->
<a href="#main-content" class="skip-to-main">Skip to main content</a>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4" aria-label="Main navigation">
    <div class="container">
        <a class="navbar-brand" href="/">JobAssistant</a>

        <div>
            <a class="btn btn-outline-light btn-sm me-2 {% block nav_dashboard %}{% endblock %}" href="/">Dashboard</a>
            <a class="btn btn-outline-light btn-sm me-2 {% block nav_jobs %}{% endblock %}" href="/jobs">Jobs</a>
            <a class="btn btn-primary btn-sm" href="/jobs/new">Add Job</a>
        </div>
    </div>
</nav>

<main id="main-content" class="container">
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
